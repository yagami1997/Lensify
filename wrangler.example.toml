# Wrangler Configuration File
# Copy this file to wrangler.toml and fill in your own values.
# wrangler.toml is gitignored and should never be committed.

name = "lensify-calculator"
main = "worker.js"
compatibility_date = "2023-05-18"

# Routes Configuration - replace with your own domain/zone
[triggers]
routes = [
  { pattern = "yourdomain.com/*", zone_name = "yourdomain.com" }
]

# SSL Configuration
[ssl]
certificate_mode = "managed_by_cloudflare"

# Build Configuration
[build]
upload.exclude = [
  "*.md",
  "LICENSE",
  ".git",
  ".gitignore",
  ".DS_Store",
  "Thumbs.db"
]

# Cloudflare Pages Configuration
pages_build_output_dir = "lensify/public"

# Environment Variables Example
# [vars]
# API_KEY = "your-api-key-here"

# To install Wrangler CLI:
# npm install -g wrangler

# To deploy Worker:
# wrangler deploy
